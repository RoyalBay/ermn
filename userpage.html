<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>ermn · User</title>
<link rel="icon" href="wicon.png">
<style>
:root {
  --accent: #3b5998;
  --body-bg: linear-gradient(180deg,#dfe7f3 0%,#f5f6f7 100%);
  --card-bg: #fff;
  --topbar-bg: #3b5998;
  --text: #333;
  --border: #b0b7c3;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: Tahoma, Verdana, sans-serif; background: var(--body-bg); color: var(--text); min-height: 100vh; font-size: 13px; }

.topbar {
  background: var(--topbar-bg);
  height: 44px;
  display: flex;
  align-items: center;
  padding: 0 12px;
  gap: 10px;
  box-shadow: 0 2px 5px rgba(0,0,0,0.3);
  border-bottom: 2px solid rgba(0,0,0,0.2);
}
.topbar-logo { font-size: 22px; font-weight: bold; color: white; letter-spacing: -1px; font-style: italic; }
.topbar-right { margin-left: auto; display: flex; gap: 6px; }
.topbar-right button {
  background: rgba(255,255,255,0.2); color: white; border: 1px solid rgba(255,255,255,0.3);
  padding: 4px 10px; font-size: 12px; cursor: pointer; font-family: inherit;
}
.topbar-right button:hover { background: rgba(255,255,255,0.35); }

.container { max-width: 680px; margin: 20px auto; padding: 0 10px; }

.card { background: var(--card-bg); border: 1px solid var(--border); margin-bottom: 12px; }
.card-title {
  background: linear-gradient(180deg, #e8edf7, #d8e0f0);
  border-bottom: 1px solid var(--border);
  padding: 6px 12px;
  font-size: 13px;
  font-weight: bold;
  color: var(--accent);
}
.card-body { padding: 14px; }

/* Profile banner */
.profile-header { display: flex; gap: 16px; align-items: flex-start; }
#userPic {
  width: 90px;
  height: 90px;
  object-fit: cover;
  border: 3px solid var(--border);
  flex-shrink: 0;
}
.profile-info h2 { font-size: 18px; color: var(--accent); margin-bottom: 4px; }
.verified { color: #1a73e8; font-size: 14px; }
.bio-text { font-style: italic; color: #555; font-size: 13px; margin-bottom: 8px; }
.stats { display: flex; gap: 0; margin-bottom: 8px; }
.stat-item {
  text-align: center;
  padding: 4px 16px 4px 0;
  border-right: 1px solid #ddd;
  margin-right: 16px;
  cursor: pointer;
}
.stat-item:last-child { border-right: none; cursor: default; }
.stat-item strong { display: block; font-size: 16px; color: var(--accent); }
.stat-item span { font-size: 11px; color: #888; }
.stat-item:hover strong { text-decoration: underline; }

#followBtn {
  background: linear-gradient(180deg,#5274b3,#3b5998);
  color: white;
  border: 1px solid #2a4070;
  padding: 5px 18px;
  font-family: inherit;
  font-size: 13px;
  font-weight: bold;
  cursor: pointer;
}
#followBtn:hover { background: linear-gradient(180deg,#6080bf,#4a6aaa); }
#followBtn.following { background: linear-gradient(180deg,#d0f0d0,#b8e8b8); color: #2a6e2a; border-color: #8ec88e; }
#followBtn.following:hover { background: linear-gradient(180deg,#b8e8b8,#a0d8a0); }

/* Posts */
.post { border-bottom: 1px solid #eee; padding: 10px 0; }
.post:last-child { border-bottom: none; }
.post-text { line-height: 1.5; margin-bottom: 5px; }
.post-footer { display: flex; align-items: center; gap: 12px; }
.post-time { font-size: 11px; color: #888; }
.heart { cursor: pointer; color: #bbb; font-size: 14px; }
.heart:hover { color: #e74c3c; }
.heart.liked { color: #e74c3c; }
.like-count { font-size: 12px; color: #555; }

/* Followers/following modal */
.modal-backdrop {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.4);
  z-index: 100;
  align-items: center;
  justify-content: center;
}
.modal-backdrop.open { display: flex; }
.modal {
  background: white;
  border: 1px solid var(--border);
  width: 300px;
  max-height: 400px;
  display: flex;
  flex-direction: column;
}
.modal-title {
  background: linear-gradient(180deg,#e8edf7,#d8e0f0);
  border-bottom: 1px solid var(--border);
  padding: 8px 12px;
  font-weight: bold;
  font-size: 13px;
  color: var(--accent);
  display: flex;
  justify-content: space-between;
  align-items: center;
}
.modal-close { cursor: pointer; color: #888; font-size: 16px; }
.modal-close:hover { color: #333; }
.modal-list { overflow-y: auto; flex: 1; padding: 8px; }
.modal-user {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 5px 4px;
  border-bottom: 1px solid #f0f0f0;
}
.modal-user:last-child { border-bottom: none; }
.modal-user img { width: 32px; height: 32px; object-fit: cover; border: 1px solid var(--border); }
.modal-user a { color: var(--accent); text-decoration: none; font-weight: bold; font-size: 13px; }
.modal-user a:hover { text-decoration: underline; }
</style>
</head>
<body>

<div class="topbar">
  <span class="topbar-logo">ermn</span>
  <div class="topbar-right">
    <button onclick="history.back()">← Back</button>
    <button onclick="location.href='feed.html'">&#127968; Feed</button>
  </div>
</div>

<div class="container">
  <div class="card">
    <div class="card-title">👤 Profile</div>
    <div class="card-body">
      <div class="profile-header">
        <img id="userPic" src="empty.jpg" onerror="this.src='empty.jpg'">
        <div class="profile-info">
          <h2 id="userName">Loading...</h2>
          <div class="bio-text" id="userBio"></div>
          <div class="stats">
            <div class="stat-item" onclick="openModal('followers')">
              <strong id="statFollowers">0</strong>
              <span>followers</span>
            </div>
            <div class="stat-item" onclick="openModal('following')">
              <strong id="statFollowing">0</strong>
              <span>following</span>
            </div>
            <div class="stat-item">
              <strong id="statPosts">0</strong>
              <span>posts</span>
            </div>
          </div>
          <button id="followBtn" onclick="toggleFollow()" style="display:none">Follow</button>
          <span id="itsYou" style="display:none;font-style:italic;color:#888;font-size:12px;">This is you · <a href="profile.html" style="color:var(--accent)">Edit profile</a></span>
        </div>
      </div>
    </div>
  </div>

  <div class="card">
    <div class="card-title" id="postsTitle">Posts</div>
    <div class="card-body" id="userPosts">
      <div style="color:#888;font-style:italic;">Loading...</div>
    </div>
  </div>
</div>

<!-- Followers/Following Modal -->
<div class="modal-backdrop" id="modalBackdrop" onclick="if(event.target===this)closeModal()">
  <div class="modal">
    <div class="modal-title">
      <span id="modalTitle">Followers</span>
      <span class="modal-close" onclick="closeModal()">✕</span>
    </div>
    <div class="modal-list" id="modalList"></div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
const SUPABASE_URL = "https://kibepwdosrjxbauxnjtn.supabase.co";
const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImtpYmVwd2Rvc3JqeGJhdXhuanRuIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY5MDczMzAsImV4cCI6MjA5MjQ4MzMzMH0._bfs8jCBRSKCkHJ6T-0SIl2j_TnGliAW6zw7OLl08Sk";
const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

const me = localStorage.getItem("currentUser");
const params = new URLSearchParams(location.search);
const viewUser = params.get("user") || me;
let isFollowing = false;

// Theme
(function(){
  const t = localStorage.getItem("theme") || "classic";
  const themes = {
    classic: { body:"linear-gradient(180deg,#dfe7f3 0%,#f5f6f7 100%)", topbar:"#3b5998" },
    bubblegum: { body:"linear-gradient(180deg,#ffe4f3 0%,#fff0fb 100%)", topbar:"#e91e8c" },
    midnight: { body:"linear-gradient(180deg,#0a0a1a 0%,#12122a 100%)", topbar:"#0d0d1f" },
    y2k: { body:"linear-gradient(180deg,#c0e8ff 0%,#e8f4ff 100%)", topbar:"#0055cc" },
    limeade: { body:"linear-gradient(180deg,#e8fce8 0%,#f5fff5 100%)", topbar:"#2d7a2d" },
  };
  const th = themes[t] || themes.classic;
  document.body.style.background = th.body;
  document.querySelector(".topbar").style.background = th.topbar;
})();

function escapeHtml(s) { return (s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;"); }
function timeAgo(d) { const diff=Math.floor((Date.now()-new Date(d))/1000); if(diff<60)return diff+"s ago"; if(diff<3600)return Math.floor(diff/60)+"m ago"; if(diff<86400)return Math.floor(diff/3600)+"h ago"; return Math.floor(diff/86400)+"d ago"; }

async function toggleFollow() {
  if (!me) return;
  const btn = document.getElementById("followBtn");
  if (isFollowing) {
    await sb.from("follows").delete().eq("follower", me).eq("following", viewUser);
    isFollowing = false;
    btn.innerText = "Follow";
    btn.className = "";
    const fc = parseInt(document.getElementById("statFollowers").innerText);
    document.getElementById("statFollowers").innerText = Math.max(0, fc - 1);
  } else {
    await sb.from("follows").insert({ follower: me, following: viewUser });
    isFollowing = true;
    btn.innerText = "✓ Following";
    btn.className = "following";
    const fc = parseInt(document.getElementById("statFollowers").innerText);
    document.getElementById("statFollowers").innerText = fc + 1;
  }
}

async function likePost(postId, el) {
  if (!me) return;
  const { data: existing } = await sb.from("likes").select("post_id").eq("post_id", postId).eq("username", me).maybeSingle();
  if (existing) {
    await sb.from("likes").delete().eq("post_id", postId).eq("username", me);
    el.classList.remove("liked");
    const cnt = el.nextElementSibling;
    cnt.innerText = (parseInt(cnt.innerText) - 1) + " likes";
  } else {
    await sb.from("likes").insert({ post_id: postId, username: me });
    el.classList.add("liked");
    const cnt = el.nextElementSibling;
    cnt.innerText = (parseInt(cnt.innerText) + 1) + " likes";
  }
}

async function openModal(type) {
  document.getElementById("modalBackdrop").className = "modal-backdrop open";
  document.getElementById("modalTitle").innerText = type === "followers" ? "Followers" : "Following";
  const list = document.getElementById("modalList");
  list.innerHTML = "<div style='padding:10px;color:#888'>Loading...</div>";

  let usernames = [];
  if (type === "followers") {
    const { data } = await sb.from("follows").select("follower").eq("following", viewUser);
    usernames = (data || []).map(r => r.follower);
  } else {
    const { data } = await sb.from("follows").select("following").eq("follower", viewUser);
    usernames = (data || []).map(r => r.following);
  }

  if (!usernames.length) { list.innerHTML = "<div style='padding:10px;color:#888;font-style:italic;'>Nobody here yet.</div>"; return; }

  const { data: users } = await sb.from("users").select("username, pic").in("username", usernames);
  const uMap = {};
  (users || []).forEach(u => { uMap[u.username] = u; });

  list.innerHTML = "";
  for (const u of usernames) {
    const info = uMap[u] || {};
    const d = document.createElement("div");
    d.className = "modal-user";
    d.innerHTML = '<img src="' + escapeHtml(info.pic || "") + '" onerror="this.src=\'empty.jpg\'">' +
      '<a href="userpage.html?user=' + encodeURIComponent(u) + '">@' + escapeHtml(u) + '</a>';
    list.appendChild(d);
  }
}

function closeModal() {
  document.getElementById("modalBackdrop").className = "modal-backdrop";
}

async function load() {
  document.title = "ermn · @" + viewUser;

  const { data: user } = await sb.from("users").select("pic, bio").eq("username", viewUser).maybeSingle();
  const { count: fc } = await sb.from("follows").select("*",{count:"exact",head:true}).eq("following", viewUser);
  const { count: fgc } = await sb.from("follows").select("*",{count:"exact",head:true}).eq("follower", viewUser);
  const { data: posts } = await sb.from("posts").select("id, text, created_at").eq("username", viewUser).order("created_at", { ascending: false });

  document.getElementById("userName").innerText = "@" + viewUser + (fc >= 100 ? " ✓" : "");
  document.getElementById("userBio").innerText = (user && user.bio) ? user.bio : "";
  document.getElementById("userPic").src = (user && user.pic) || "empty.jpg";
  document.getElementById("statFollowers").innerText = fc || 0;
  document.getElementById("statFollowing").innerText = fgc || 0;
  document.getElementById("statPosts").innerText = (posts || []).length;
  document.getElementById("postsTitle").innerText = "📝 Posts by @" + viewUser;

  if (me && viewUser !== me) {
    document.getElementById("followBtn").style.display = "inline-block";
    const { data: fcheck } = await sb.from("follows").select("follower").eq("follower", me).eq("following", viewUser).maybeSingle();
    isFollowing = !!fcheck;
    const btn = document.getElementById("followBtn");
    btn.innerText = isFollowing ? "✓ Following" : "Follow";
    if (isFollowing) btn.className = "following";
  } else if (viewUser === me) {
    document.getElementById("itsYou").style.display = "block";
  }

  // Load this user's posts with like info
  let likedSet = new Set();
  if (me) {
    const { data: myLikes } = await sb.from("likes").select("post_id").eq("username", me);
    likedSet = new Set((myLikes || []).map(l => l.post_id));
  }
  const postIds = (posts || []).map(p => p.id);
  const { data: allLikes } = postIds.length ? await sb.from("likes").select("post_id").in("post_id", postIds) : { data: [] };
  const likeMap = {};
  (allLikes || []).forEach(l => { likeMap[l.post_id] = (likeMap[l.post_id] || 0) + 1; });

  const postsEl = document.getElementById("userPosts");
  if (!posts || !posts.length) { postsEl.innerHTML = "<div style='color:#888;font-style:italic;'>No posts yet.</div>"; return; }
  postsEl.innerHTML = "";
  for (const p of posts) {
    const liked = likedSet.has(p.id);
    const likeCount = likeMap[p.id] || 0;
    const d = document.createElement("div");
    d.className = "post";
    d.innerHTML = '<div class="post-text">' + escapeHtml(p.text) + '</div>' +
      '<div class="post-footer">' +
        '<span id="hlikes-' + p.id + '">' +
          '<span class="heart' + (liked ? " liked" : "") + '" onclick="likePost(' + p.id + ',this)">&#9829;</span> ' +
          '<span class="like-count">' + likeCount + ' likes</span>' +
        '</span>' +
        '<span class="post-time">' + timeAgo(p.created_at) + '</span>' +
      '</div>';
    postsEl.appendChild(d);
  }
}

load();
</script>
</body>
</html>
