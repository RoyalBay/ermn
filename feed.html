<!DOCTYPE html>
<html>
<head>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<meta charset="UTF-8">
<title>ermn Feed</title>
<link rel="icon" href="wicon.png">
<style>
body { margin:0; font-family:Tahoma; background:#f5f6f7; }
.topbar { height:44px; background:#3b5998; color:white; display:flex; justify-content:space-between; align-items:center; padding:0 10px; }
.topbar .left { display:flex; align-items:center; gap:8px; }
.container { display:flex; max-width:1100px; margin:20px auto; gap:10px; padding:0 10px; }
.feed { flex:1; background:white; border:1px solid #ccc; padding:10px; }
.profile { width:220px; background:white; border:1px solid #ccc; padding:10px; }
.post { border-top:1px solid #eee; padding:10px; position:relative; }
.user { font-weight:bold; cursor:pointer; color:#3b5998; }
.delete { position:absolute; bottom:5px; right:5px; color:red; cursor:pointer; font-size:12px; }
textarea { width:100%; height:60px; resize:none; box-sizing:border-box; }
button { background:#3b5998; color:white; border:none; padding:6px; margin-top:5px; cursor:pointer; }
#popup { display:none; position:fixed; left:10px; top:80px; width:220px; background:white; border:1px solid #ccc; padding:10px; box-sizing:border-box; z-index:100; }
#pname { font-weight:bold; }
#loading { text-align:center; padding:20px; color:#888; }
</style>
</head>
<body>

<div class="topbar">
  <div class="left"><b style="font-size:18px;">ermn</b></div>
  <div>
    <button onclick="location.href='settings.html'">Settings</button>
    <button onclick="logout()">Logout</button>
  </div>
</div>

<div id="popup">
  <img id="ppic" width="60" style="display:block;margin-bottom:6px;">
  <div id="pname"></div>
  <div id="pfollow"></div>
  <div id="pfollowBtn" style="margin-top:6px;"></div>
  <div style="font-size:11px;color:#888;margin-top:4px;cursor:pointer;" onclick="document.getElementById('popup').style.display='none'">close ✕</div>
</div>

<div class="container">
  <div class="feed">
    <textarea id="text" placeholder="What's happening?"></textarea>
    <button onclick="post()">Post</button>
    <div id="loading">Loading posts...</div>
    <div id="posts"></div>
  </div>
  <div class="profile">
    <img id="rightPic" width="70" height="70" style="object-fit:cover;display:block;margin-bottom:6px;">
    <div id="rightName" style="font-weight:bold;"></div>
    <div id="rightFollowers"></div>
    <br>
    <input type="file" id="file" accept="image/*">
    <button onclick="upload(document.getElementById('file').files[0])">Update Profile Picture</button>
  </div>
</div>

<script src="app.js"></script>
<script>
// Guard: redirect if not logged in
if (!localStorage.getItem("currentUser")) location.href = "index.html";

function logout() {
  localStorage.removeItem("currentUser");
  location.href = "index.html";
}

applyTheme();
setInterval(applyTheme, 2000);

render().then(() => {
  document.getElementById("loading").style.display = "none";
});

// Close popup on outside click
document.addEventListener("click", e => {
  const popup = document.getElementById("popup");
  if (popup.style.display === "block" && !popup.contains(e.target) && !e.target.classList.contains("user")) {
    popup.style.display = "none";
  }
});
</script>

</body>
</html>
