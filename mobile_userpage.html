<!DOCTYPE html>
<html>
<head>
  <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>ermn. · Profile</title>
<link rel="icon" href="wicon.png">
<link rel="stylesheet" href="mobile_modern.css">
<style>
  .profile-header { text-align: center; padding: 30px 20px; background: white; border-bottom: 1px solid #ddd; position: relative; }
  .profile-avatar { width: 100px; height: 100px; border-radius: 12px; margin-bottom: 12px; object-fit: cover; border: 4px solid #eee; }
  .profile-name { font-size: 20px; font-weight: 800; margin-bottom: 4px; }
  .profile-bio { font-size: 14px; color: #666; margin-bottom: 15px; }
  .stats { display: flex; justify-content: center; gap: 20px; margin-bottom: 15px; }
  .stat-item { text-align: center; }
  .stat-val { font-weight: 800; font-size: 16px; display: block; }
  .stat-lbl { font-size: 10px; color: #888; text-transform: uppercase; }
  .profile-actions { display: flex; justify-content: center; gap: 10px; }
</style>
</head>
<body>
<div class="topbar">
  <span class="topbar-logo">ermn.</span>
</div>

<div id="profileContent" style="display:none;">
  <div class="profile-header" id="profileBg">
    <img id="pfp" class="profile-avatar" src="empty.jpg">
    <div id="pName" class="profile-name">@...</div>
    <div id="pBio" class="profile-bio">...</div>
    <div class="stats">
      <div class="stat-item"><span class="stat-val" id="countFollowers">0</span><span class="stat-lbl">Followers</span></div>
      <div class="stat-item"><span class="stat-val" id="countFollowing">0</span><span class="stat-lbl">Following</span></div>
    </div>
    <div class="profile-actions" id="pActions">
      <button class="btn" id="followBtn" style="display:none;">Follow</button>
    </div>
  </div>

  <div class="main">
    <div id="pPosts"></div>
  </div>
</div>

<div id="pLoading" style="text-align:center; padding:50px; color:#888; font-style:italic;">Loading profile...</div>

<nav class="bottom-nav">
  <a href="mobile_feed.html"><span class="material-icons">home</span><span>Home</span></a>
  <a href="mobile_algo_feed.html"><span class="material-icons">explore</span><span>Feed</span></a>
  <a href="mobile_profile.html"><span class="material-icons">person</span><span>Profile</span></a>
  <a href="mobile_settings.html"><span class="material-icons">settings</span><span>Settings</span></a>
</nav>

<script src="config.js"></script>
<script src="theme.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="app.js"></script>
<script>
const targetUser = new URLSearchParams(location.search).get("user");
if (!targetUser) location.href = "mobile_feed.html";

async function loadProfile() {
  const { data: user } = await sb.from("users").select("*").ilike("username", targetUser).maybeSingle();
  if (!user) {
    document.getElementById("pLoading").innerText = "User not found.";
    return;
  }

  document.title = `ermn. · @${user.username}`;
  document.getElementById("pName").innerText = "@" + user.username;
  document.getElementById("pBio").innerText = user.bio || "No bio yet.";
  document.getElementById("pfp").src = user.pic || "empty.jpg";
  if (user.equipped_shell) document.getElementById("pfp").style.border = user.equipped_shell;
  if (user.equipped_background) document.getElementById("profileBg").style.background = user.equipped_background;

  const { count: followers } = await sb.from("follows").select("*", {count:'exact', head:true}).eq("following", user.username);
  const { count: following } = await sb.from("follows").select("*", {count:'exact', head:true}).eq("follower", user.username);
  document.getElementById("countFollowers").innerText = followers || 0;
  document.getElementById("countFollowing").innerText = following || 0;

  document.getElementById("pLoading").style.display = "none";
  document.getElementById("profileContent").style.display = "block";

  render(null, "newest", 0, user.username, "pPosts");
}

document.addEventListener("sessionReady", loadProfile);
</script>
</body>
</html>
