<!DOCTYPE html>
<html>
<head>
  <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>ermn. · Feed</title>
<link rel="icon" href="wicon.png">
<link rel="stylesheet" href="mobile_modern.css">
</head>
<body>
<div class="topbar">
  <span class="topbar-logo">ermn.</span>
  <div class="topbar-right">
    <button onclick="logout()" style="background:rgba(255,255,255,0.2); border:1px solid rgba(255,255,255,0.3); border-radius:4px; color:white; padding:4px 8px; font-size:12px;">Logout</button>
  </div>
</div>

<div class="search-row" style="background:white; border-bottom:1px solid #ddd; padding:10px; display:flex; gap:8px;">
  <select id="searchMode" onchange="onModeChange()" style="padding:8px; border-radius:6px; border:1px solid #ddd; font-size:14px; width:80px;">
    <option value="posts">Posts</option>
    <option value="users">Users</option>
  </select>
  <input id="searchInput" placeholder="Search..." onkeydown="if(event.key==='Enter')doSearch()" style="flex:1; padding:8px; border-radius:6px; border:1px solid #ddd; font-size:14px;">
  <button onclick="doSearch()" style="background:var(--accent); color:white; border:none; padding:8px 12px; border-radius:6px;"><span class="material-icons">search</span></button>
</div>

<div class="main">
  <div class="compose-box">
    <h4><span class="material-icons">edit</span> What's on your mind?</h4>
    <textarea id="text" placeholder="Share something..."></textarea>
    <div class="actions">
      <button id="postBtn" onclick="mPost()">Post</button>
    </div>
  </div>
  <div id="loading" style="text-align:center;padding:20px;color:#888;font-style:italic;">Loading...</div>
  <div id="posts"></div>
  <div id="pagination"></div>
</div>

<nav class="bottom-nav">
  <a href="mobile_feed.html" class="active"><span class="material-icons">home</span><span>Home</span></a>
  <a href="mobile_algo_feed.html"><span class="material-icons">explore</span><span>Feed</span></a>
  <a href="mobile_profile.html"><span class="material-icons">person</span><span>Profile</span></a>
  <a href="mobile_settings.html"><span class="material-icons">settings</span><span>Settings</span></a>
</nav>

<script src="config.js"></script>
<script src="theme.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="app.js"></script>
<script>
const cu = localStorage.getItem("currentUser");
if (!cu) location.href = "mobile.html";

function onModeChange(){
  const mode = document.getElementById("searchMode").value;
  const inp = document.getElementById("searchInput");
  inp.placeholder = mode === "users" ? "Search users..." : "Search posts...";
  document.getElementById("posts").innerHTML = "";
  document.getElementById("pagination").innerHTML = "";
}

function doSearch(){
  const mode = document.getElementById("searchMode").value;
  _searchQ = document.getElementById("searchInput").value.trim();
  _currentPage = 0;
  if (mode === "users") {
    renderUserSearch(_searchQ);
  } else {
    render(_searchQ, "newest", 0);
  }
}

function goPage(p){
  window.scrollTo(0,0);
  render(_searchQ || "", "newest", p);
}

let _searchQ = "";

document.addEventListener("sessionReady", () => {
  render().then(()=>{ const l=document.getElementById("loading"); if(l)l.style.display="none"; });
});

function mPost(){
  post().then(()=>{ const l=document.getElementById("loading"); if(l)l.style.display="none"; });
}
</script>
</body>
</html>
