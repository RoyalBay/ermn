<!DOCTYPE html>
<html>
<head>
  <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ermn. · ERN Bank</title>
<link rel="icon" href="wicon.png">
<style>
:root {
  --accent: #3b5998;
  --gold: #f57f17;
  --bg: linear-gradient(180deg, #1a2a44 0%, #0d1521 100%);
  --card-bg: #ffffff;
  --text: #333;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: Tahoma, Verdana, sans-serif;
  background: var(--bg);
  color: white;
  min-height: 100vh;
  padding-bottom: 40px;
}
.topbar { background:#3b5998; height:44px; display:flex; align-items:center; padding:0 12px; gap:10px; position:sticky; top:0; z-index:50; box-shadow:0 2px 5px rgba(0,0,0,0.3); }
.topbar-logo { font-size:22px; font-weight:bold; color:white; letter-spacing:-1px; font-style:italic; }

.container { max-width: 500px; margin: 30px auto; padding: 0 15px; }

.bank-card {
  background: white;
  color: #333;
  border-radius: 4px;
  overflow: hidden;
  box-shadow: 0 10px 25px rgba(0,0,0,0.5);
  margin-bottom: 20px;
}
.bank-header {
  background: linear-gradient(135deg, #3b5998 0%, #1e2f50 100%);
  color: white;
  padding: 30px;
  text-align: center;
}
.bank-header h1 { font-size: 20px; letter-spacing: 2px; text-transform: uppercase; margin-bottom: 15px; opacity: 0.9; }
.balance-display { font-size: 42px; font-weight: bold; font-family: 'Courier New', Courier, monospace; margin: 10px 0; }
.balance-label { font-size: 11px; text-transform: uppercase; opacity: 0.7; letter-spacing: 1px; }

.bank-body { padding: 25px; }
.wallet-summary {
  display: flex;
  justify-content: space-between;
  background: #f8f9fa;
  padding: 15px;
  border: 1px solid #eee;
  margin-bottom: 25px;
}
.wallet-item { text-align: center; flex: 1; }
.wallet-item:first-child { border-right: 1px solid #ddd; }
.wallet-val { font-size: 18px; font-weight: bold; color: var(--accent); }
.wallet-lbl { font-size: 10px; text-transform: uppercase; color: #888; }

.form-group { margin-bottom: 20px; }
label { display: block; font-size: 12px; font-weight: bold; margin-bottom: 8px; color: #555; }
input {
  width: 100%;
  padding: 12px;
  font-size: 18px;
  border: 2px solid #eee;
  border-radius: 4px;
  font-family: inherit;
  text-align: center;
}
input:focus { outline: none; border-color: var(--accent); }

.actions { display: flex; gap: 10px; }
.btn {
  flex: 1;
  padding: 12px;
  border: none;
  border-radius: 4px;
  font-weight: bold;
  cursor: pointer;
  font-family: inherit;
  font-size: 14px;
  transition: transform 0.1s;
}
.btn:active { transform: scale(0.98); }
.btn-deposit { background: var(--accent); color: white; }
.btn-withdraw { background: #eee; color: #333; border: 1px solid #ddd; }

.msg { margin-top: 15px; padding: 10px; border-radius: 4px; font-size: 13px; display: none; text-align: center; }
.msg.error { background: #fee; color: #c00; display: block; }
.msg.success { background: #efe; color: #080; display: block; }

.back-link { display: block; text-align: center; color: rgba(255,255,255,0.6); text-decoration: none; font-size: 13px; margin-top: 20px; }
.back-link:hover { color: white; }
</style>
</head>
<body>

<div class="topbar">
  <span class="topbar-logo">ermn.</span>
</div>

<div class="container">
  <div class="bank-card">
    <div class="bank-header">
      <h1>ERN Private Banking</h1>
      <div class="balance-label">Vault Balance</div>
      <div class="balance-display" id="bankBalance">0.00</div>
      <div style="font-size: 12px; opacity: 0.8;">ERN</div>
    </div>
    
    <div class="bank-body">
      <div class="wallet-summary">
        <div class="wallet-item">
          <div class="wallet-val" id="walletBalance">0.00</div>
          <div class="wallet-lbl">Liquid Balance</div>
        </div>
        <div class="wallet-item">
          <div class="wallet-val" id="totalAssets">0.00</div>
          <div class="wallet-lbl">Total Assets</div>
        </div>
      </div>

      <div class="form-group">
        <label>Transaction Amount (ERN)</label>
        <input type="number" id="amount" placeholder="0.00" min="0" step="0.01">
      </div>

      <div class="actions">
        <button class="btn btn-withdraw" onclick="transact('withdraw')">Withdraw</button>
        <button class="btn btn-deposit" onclick="transact('deposit')">Deposit</button>
      </div>

      <div id="msg" class="msg"></div>
    </div>
  </div>

  <a href="feed.html" class="back-link">Return to Home</a>
</div>

<script src="config.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
const sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
const me = localStorage.getItem("currentUser");

if (!me) { location.href = "index.html"; }

async function loadBalances() {
  const { data, error } = await sb.from("ermnium_wallets")
    .select("balance, bank_balance")
    .ilike("username", me)
    .maybeSingle();

  if (data) {
    const bal = parseFloat(data.balance || 0);
    const bank = parseFloat(data.bank_balance || 0);
    document.getElementById("walletBalance").innerText = bal.toFixed(2);
    document.getElementById("bankBalance").innerText = bank.toFixed(2);
    document.getElementById("totalAssets").innerText = (bal + bank).toFixed(2);
  }
}

async function transact(type) {
  const amt = parseFloat(document.getElementById("amount").value);
  const msgEl = document.getElementById("msg");
  
  if (isNaN(amt) || amt <= 0) {
    showMsg("Please enter a valid amount.", true);
    return;
  }

  msgEl.className = "msg";
  msgEl.innerText = type === 'deposit' ? "Depositing..." : "Withdrawing...";
  msgEl.style.display = "block";

  const { data, error } = await sb.rpc('ermn_bank_transaction', {
    p_username: me,
    p_amount: amt,
    p_type: type
  });

  if (error) {
    showMsg("Database Error: " + error.message, true);
  } else if (!data.success) {
    showMsg(data.message, true);
  } else {
    showMsg(`Successfully ${type}ed ${amt} ERN!`, false);
    document.getElementById("amount").value = "";
    await loadBalances();
  }
}

function showMsg(txt, isErr) {
  const msgEl = document.getElementById("msg");
  msgEl.innerText = txt;
  msgEl.className = "msg " + (isErr ? "error" : "success");
}

loadBalances();
</script>
</body>
</html>
