<!DOCTYPE html>
<html>
<head>
  <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>ermn. · Profile</title>
<link rel="icon" href="wicon.png">
<style>
:root{
  /* Themes will inject variables here via theme.js */
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:Tahoma,Verdana,sans-serif;background:var(--body-bg);color:var(--text);min-height:100vh;font-size:14px;padding-bottom:60px;}

.topbar{background:var(--topbar-bg);height:48px;display:flex;align-items:center;padding:0 12px;position:sticky;top:0;z-index:50;}
.topbar-logo{font-size:22px;font-weight:bold;color:white;letter-spacing:-1px;font-style:italic;}

.main{padding:8px; width:100%; max-width:100%; overflow-x:hidden;}

.profile-card{background:var(--card-bg);border:1px solid var(--border);border-radius:2px;margin-bottom:10px; width:100%;}
.profile-header{padding:15px; border-bottom:1px solid #eee; position:relative;}
.profile-avatar{width:80px; height:80px; border-radius:2px; object-fit:cover; border:2px solid var(--border);}
.profile-meta{margin-top:10px;}
.profile-name{font-size:18px; font-weight:bold; color:var(--accent);}
.profile-bio{font-size:13px; color:#666; margin-top:4px; line-height:1.4;}

.stats-row{display:flex; gap:15px; margin-top:10px; font-size:12px; color:#444;}
.stat-item b{color:var(--accent);}

.post{background:var(--card-bg);border:1px solid var(--border);border-radius:2px;margin-bottom:10px;padding:10px; width:100%;}
.post-header{display:flex;align-items:flex-start;gap:10px;margin-bottom:8px;}
.post-avatar{width:44px;height:44px;object-fit:cover;border:2px solid var(--border);border-radius:2px;flex-shrink:0;}
.user-link{color:var(--accent);font-weight:bold;text-decoration:none;font-size:15px;}
.post-time{font-size:11px;color:#888;}
.post-text{line-height:1.5;margin-bottom:8px;word-break:break-word; font-size:14px;}

.bottom-nav{position:fixed;bottom:0;left:0;right:0;background:var(--topbar-bg);border-top:2px solid rgba(0,0,0,0.2);display:flex;height:52px;z-index:100;}
.bottom-nav a{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;color:rgba(255,255,255,0.8);text-decoration:none;font-size:10px;gap:2px;}
.bottom-nav a .material-icons { font-size: 20px; }

.badge-icon { width:14px; height:14px; vertical-align: middle; margin-left:2px; }

/* Modal */
.modal-backdrop {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.5);
  z-index: 200;
  align-items: center;
  justify-content: center;
  padding: 20px;
}
.modal-backdrop.open { display: flex; }
.modal {
  background: var(--card-bg);
  border: 1px solid var(--border);
  width: 100%;
  max-width: 320px;
  max-height: 80vh;
  display: flex;
  flex-direction: column;
  border-radius: 2px;
}
.modal-title {
  background: var(--card-header);
  border-bottom: 1px solid var(--border);
  padding: 10px 12px;
  font-weight: bold;
  font-size: 14px;
  color: var(--accent);
  display: flex;
  justify-content: space-between;
  align-items: center;
}
.modal-list { overflow-y: auto; flex: 1; padding: 10px; }
.modal-user {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 8px 0;
  border-bottom: 1px solid #f0f0f0;
}
.modal-user img { width: 36px; height: 36px; object-fit: cover; border: 1px solid var(--border); }
.modal-user a { color: var(--accent); text-decoration: none; font-weight: bold; font-size: 14px; }
.stat-item { cursor: pointer; }
.stat-item:active { opacity: 0.7; }
</style>
</head>
<body>
<div class="topbar">
  <span class="topbar-logo">ermn.</span>
</div>

<div class="main">
  <div id="pLoading" style="text-align:center; padding:30px; color:#888; font-style:italic;">Loading...</div>
  <div id="profileContainer" style="display:none;">
    <div class="profile-card" id="profileBg">
      <div class="profile-header">
        <img id="pfp" class="profile-avatar" src="empty.jpg">
        <div class="profile-meta">
          <div id="pName" class="profile-name">@...</div>
          <div id="pBio" class="profile-bio">...</div>
          <div class="stats-row">
            <span class="stat-item" onclick="openModal('followers')"><b id="countFollowers">0</b> followers</span>
            <span class="stat-item" onclick="openModal('following')"><b id="countFollowing">0</b> following</span>
          </div>
          <div id="pActions" style="margin-top:12px;">
            <button id="followBtn" class="btn" style="display:none; width:auto; padding:6px 16px;"></button>
          </div>
        </div>
      </div>
    </div>
    <div id="pPosts"></div>
  </div>
</div>

<div id="modalBackdrop" class="modal-backdrop" onclick="closeModal()">
  <div class="modal" onclick="event.stopPropagation()">
    <div class="modal-title">
      <span id="modalTitle">Users</span>
      <span class="material-icons" onclick="closeModal()" style="cursor:pointer; font-size:18px;">close</span>
    </div>
    <div id="modalList" class="modal-list"></div>
  </div>
</div>

<nav class="bottom-nav">
  <a href="mobile_feed.html"><span class="material-icons">home</span><span>Home</span></a>
  <a href="mobile_algo_feed.html"><span class="material-icons">explore</span><span>Feed</span></a>
  <a href="mobile_profile.html"><span class="material-icons">person</span><span>Profile</span></a>
  <a href="mobile_settings.html"><span class="material-icons">settings</span><span>Settings</span></a>
</nav>

<script src="config.js"></script>
<script src="theme.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="app.js"></script>
<script>
const targetUser = new URLSearchParams(location.search).get("user");
if (!targetUser) location.href = "mobile_feed.html";

async function loadProfile() {
  const { data: user } = await sb.from("users").select("*").ilike("username", targetUser).maybeSingle();
  if (!user) {
    document.getElementById("pLoading").innerText = "User not found.";
    return;
  }

  document.getElementById("pName").innerText = "@" + user.username;
  document.getElementById("pBio").innerText = user.bio || "No bio yet.";
  document.getElementById("pfp").src = user.pic || "empty.jpg";
  if (user.equipped_shell) document.getElementById("pfp").style.cssText += "border:" + user.equipped_shell + ";";
  if (user.equipped_background) document.getElementById("profileBg").style.background = user.equipped_background;

  const { count: followers } = await sb.from("follows").select("*", {count:'exact', head:true}).eq("following", user.username);
  const { count: following } = await sb.from("follows").select("*", {count:'exact', head:true}).eq("follower", user.username);
  document.getElementById("countFollowers").innerText = followers || 0;
  document.getElementById("countFollowing").innerText = following || 0;

  document.getElementById("pLoading").style.display = "none";
  document.getElementById("profileContainer").style.display = "block";

  if (currentUser && user.username !== currentUser) {
    const btn = document.getElementById("followBtn");
    btn.style.display = "block";
    const { data: follow } = await sb.from("follows").select("*").eq("follower", currentUser).eq("following", user.username).maybeSingle();
    if (follow) {
      btn.innerText = "Unfollow";
      btn.style.background = "#eee";
      btn.style.color = "#333";
    } else {
      btn.innerText = "Follow";
      btn.style.background = "var(--accent)";
      btn.style.color = "white";
    }
    btn.onclick = () => mFollow(user.username);
  }

  render(null, "newest", 0, user.username, "pPosts");
}

async function mFollow(target) {
  const { data: existing } = await sb.from("follows").select("*").eq("follower", currentUser).eq("following", target).maybeSingle();
  if (existing) {
    await sb.from("follows").delete().eq("follower", currentUser).eq("following", target);
  } else {
    await sb.from("follows").insert({ follower: currentUser, following: target });
  }
  loadProfile();
}

function closeModal() {
  document.getElementById("modalBackdrop").classList.remove("open");
}

async function openModal(type) {
  const backdrop = document.getElementById("modalBackdrop");
  const title = document.getElementById("modalTitle");
  const list = document.getElementById("modalList");

  title.innerText = type === "followers" ? "Followers" : "Following";
  list.innerHTML = "<div style='text-align:center;padding:20px;color:#888;font-style:italic;'>Loading...</div>";
  backdrop.classList.add("open");

  let query;
  if (type === "followers") {
    query = sb.from("follows").select("follower").eq("following", targetUser);
  } else {
    query = sb.from("follows").select("following").eq("follower", targetUser);
  }

  const { data: results } = await query;
  if (!results || !results.length) {
    list.innerHTML = "<div style='text-align:center;padding:20px;color:#888;'>No users found.</div>";
    return;
  }

  const usersList = results.map(r => type === "followers" ? r.follower : r.following);
  const { data: userDetails } = await sb.from("users").select("username, pic, equipped_shell").in("username", usersList);

  list.innerHTML = "";
  (userDetails || []).forEach(u => {
    const div = document.createElement("div");
    div.className = "modal-user";
    div.innerHTML = `
      <img src="${u.pic || 'empty.jpg'}" style="${u.equipped_shell ? 'border:'+u.equipped_shell+';' : ''}">
      <a href="${getUserPageLink(u.username)}">@${u.username}</a>
    `;
    div.onclick = () => { location.href = getUserPageLink(u.username); };
    list.appendChild(div);
  });
}

document.addEventListener("sessionReady", loadProfile);
</script>
</body>
</html>
