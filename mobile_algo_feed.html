<!DOCTYPE html>
<html>
<head>
  <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>ermn. · Discovery</title>
<link rel="icon" href="wicon.png">
<style>
:root{
  /* Themes will inject variables here via theme.js */
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:Tahoma,Verdana,sans-serif;background:var(--body-bg);color:var(--text);min-height:100vh;font-size:14px;padding-bottom:60px;}

.topbar{background:var(--topbar-bg);height:48px;display:flex;align-items:center;padding:0 12px;position:sticky;top:0;z-index:50;box-shadow:0 2px 6px rgba(0,0,0,0.3);}
.topbar-logo{font-size:22px;font-weight:bold;color:white;letter-spacing:-1px;font-style:italic;}

.main{padding:8px; width:100%; max-width:100%; overflow-x:hidden;}

.algo-header { background:var(--card-header); border:1px solid var(--border); border-radius:2px; padding:15px; margin-bottom:10px; text-align:center; }
.algo-header h2 { font-size:18px; color:var(--accent); font-style:italic; letter-spacing:-1px; margin-bottom:4px; }
.algo-header p { font-size:12px; color:#666; }

.post{background:var(--card-bg);border:1px solid var(--border);border-radius:2px;margin-bottom:10px;padding:10px; width:100%; box-sizing:border-box;}
.post-header{display:flex;align-items:flex-start;gap:10px;margin-bottom:8px;position:relative;}
.post-avatar{width:44px;height:44px;object-fit:cover;border:2px solid var(--border);border-radius:2px;flex-shrink:0;}
.post-meta{flex:1; min-width:0; display:flex; align-items:center; flex-wrap:wrap; gap:4px;}
.user-link{color:var(--accent);font-weight:bold;text-decoration:none;font-size:15px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap;}
.post-time{font-size:11px;color:#888; width:100%; margin-top:2px;}
.follow-btn{background:#e8edf7;color:var(--accent);border:1px solid var(--border);font-size:11px;padding:2px 6px;cursor:pointer;font-family:inherit;border-radius:2px;}
.follow-btn.following{background:#d0f0d0;color:#2a6e2a;border-color:#8ec88e;}

.post-text{line-height:1.5;margin-bottom:8px;word-break:break-word; font-size:14px;}
.post-actions{display:flex;gap:16px;border-top:1px solid #eee;padding-top:8px;font-size:13px;flex-wrap:wrap;}
.heart{cursor:pointer;color:#bbb;}
.heart.liked{color:#e74c3c;}
.like-wrap{color:#555; display:flex; align-items:center; gap:4px;}
.comment-toggle{cursor:pointer;color:#555; display:flex; align-items:center; gap:4px;}

/* Bottom nav */
.bottom-nav{position:fixed;bottom:0;left:0;right:0;background:var(--topbar-bg);border-top:2px solid rgba(0,0,0,0.2);display:flex;height:52px;z-index:100;}
.bottom-nav a{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;color:rgba(255,255,255,0.8);text-decoration:none;font-size:10px;gap:2px;}
.bottom-nav a.active{background:rgba(255,255,255,0.15); color:white;}
.bottom-nav a .material-icons { font-size: 20px; }

/* Badges */
.badge-icon { width: 14px; height: 14px; vertical-align: middle; margin-left: 2px; }
</style>
</head>
<body>
<div class="topbar">
  <span class="topbar-logo">ermn.</span>
</div>

<div class="main">
  <div class="algo-header">
    <h2>Discovery</h2>
    <p>Curated trends based on engagement.</p>
  </div>
  <div id="loading" style="text-align:center;padding:20px;color:#888;font-style:italic;">Finding trends...</div>
  <div id="posts"></div>
</div>

<nav class="bottom-nav">
  <a href="mobile_feed.html"><span class="material-icons">home</span><span>Home</span></a>
  <a href="mobile_algo_feed.html" class="active"><span class="material-icons">explore</span><span>Feed</span></a>
  <a href="mobile_profile.html"><span class="material-icons">person</span><span>Profile</span></a>
  <a href="mobile_settings.html"><span class="material-icons">settings</span><span>Settings</span></a>
</nav>

<script src="config.js"></script>
<script src="theme.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="app.js"></script>
<script>
const cu = localStorage.getItem("currentUser");
if (!cu) location.href = "mobile.html";

document.addEventListener("sessionReady", () => {
  renderAlgo().then(()=>{ 
    const l=document.getElementById("loading"); 
    if(l)l.style.display="none"; 
  });
});
if (currentUser) document.dispatchEvent(new Event("sessionReady"));
</script>
</body>
</html>
