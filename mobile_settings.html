<!DOCTYPE html>
<html>
<head>
  <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>ermn. · Settings</title>
<link rel="icon" href="wicon.png">
<link rel="stylesheet" href="mobile_modern.css">
<style>
  .info-row { display: flex; justify-content: space-between; padding: 10px 0; border-bottom: 1px solid #eee; font-size: 14px; }
  .info-row:last-child { border-bottom: none; }
</style>
</head>
<body>
<div class="topbar">
  <span class="topbar-logo">ermn.</span>
</div>

<div class="main">
  <div class="card">
    <div class="compose-box" style="margin-bottom:0; border:none; border-radius:0;">
      <h4 style="background:var(--accent); color:white; border:none;"><span class="material-icons">palette</span> Theme & Look</h4>
    </div>
    <div class="card-body" style="padding:15px;">
      <div style="display:grid; grid-template-columns: repeat(3, 1fr); gap:10px;">
        <button onclick="setTheme('classic')" style="border:none; background:none; text-align:center;">
          <div style="height:30px; background:#3b5998; border-radius:4px; margin-bottom:4px;"></div>
          <span style="font-size:10px; font-weight:bold;">Classic</span>
        </button>
        <button onclick="setTheme('midnight')" style="border:none; background:none; text-align:center;">
          <div style="height:30px; background:#12122a; border-radius:4px; margin-bottom:4px;"></div>
          <span style="font-size:10px; font-weight:bold;">Midnight</span>
        </button>
        <button onclick="setTheme('cyberpunk')" style="border:none; background:none; text-align:center;">
          <div style="height:30px; background:#ff00ff; border-radius:4px; margin-bottom:4px;"></div>
          <span style="font-size:10px; font-weight:bold;">Cyber</span>
        </button>
      </div>
    </div>
  </div>

  <div class="card">
    <div class="compose-box" style="margin-bottom:0; border:none; border-radius:0;">
      <h4 style="background:#555; color:white; border:none;"><span class="material-icons">swap_horiz</span> Data Portability</h4>
    </div>
    <div class="card-body" style="padding:15px;">
      <p style="font-size:12px; color:#666; margin-bottom:12px;">Export or restore your posts, likes, and balances.</p>
      <button class="btn" onclick="exportData()" style="width:100%; margin-bottom:10px;">Export My Data (.ermn)</button>
      <label for="importFile" class="btn" style="width:100%; display:block; text-align:center; background:#eee; color:#333; border:1px solid #ccc;">Import Backup</label>
      <input type="file" id="importFile" accept=".ermn" style="display:none;" onchange="previewImport(event)">
      <div id="importMsg" class="msg"></div>
      <div id="importPreview" style="display:none; margin-top:10px; background:#f9f9f9; padding:10px; border:1px solid #ddd; border-radius:6px;">
        <div id="importPreviewBody" style="font-size:12px; margin-bottom:10px;"></div>
        <button class="btn" onclick="importData()" style="width:100%;">Restore Content</button>
      </div>
    </div>
  </div>

  <div class="card" id="devCard" style="display:none;">
    <div class="compose-box" style="margin-bottom:0; border:none; border-radius:0;">
      <h4 style="background:#c00; color:white; border:none;"><span class="material-icons">code</span> Developer Tools</h4>
    </div>
    <div class="card-body" style="padding:15px;">
      <button id="maintenanceToggle" class="btn" style="width:100%; background:#c00;" onclick="toggleMaintenanceMode()">SITE MAINTENANCE: OFF</button>
      <p style="font-size:10px; color:#888; margin-top:6px; text-align:center;">Nuclear switch: Shuts down site for non-staff.</p>
    </div>
  </div>

  <div class="card">
    <div class="compose-box" style="margin-bottom:0; border:none; border-radius:0;">
      <h4 style="background:#3b5998; color:white; border:none;"><span class="material-icons">info</span> Account Info</h4>
    </div>
    <div class="card-body" style="padding:15px;">
      <div class="info-row"><span>Username</span><span id="infoUser">@...</span></div>
      <div class="info-row"><span>Member Since</span><span id="infoJoined">...</span></div>
      <button class="btn" onclick="logout()" style="width:100%; background:#f5f6f7; color:#c00; border:1px solid #ddd; margin-top:15px;">Logout</button>
    </div>
  </div>
</div>

<nav class="bottom-nav">
  <a href="mobile_feed.html"><span class="material-icons">home</span><span>Home</span></a>
  <a href="mobile_algo_feed.html"><span class="material-icons">explore</span><span>Feed</span></a>
  <a href="mobile_profile.html"><span class="material-icons">person</span><span>Profile</span></a>
  <a href="mobile_settings.html" class="active"><span class="material-icons">settings</span><span>Settings</span></a>
</nav>

<script src="config.js"></script>
<script src="theme.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="app.js"></script>
<script>
const me = localStorage.getItem("currentUser");

async function loadSettings() {
  document.getElementById("infoUser").innerText = "@" + me;
  const { data: user } = await sb.from("users").select("created_at, is_admin, is_developer").ilike("username", me).maybeSingle();
  if (user) {
    document.getElementById("infoJoined").innerText = new Date(user.created_at).toLocaleDateString();
    if (user.is_admin || user.is_developer) {
      document.getElementById("devCard").style.display = "block";
      initMaintenanceStatus();
    }
  }
}

/* Reusing functions from desktop settings.html */
/* I'll inject the necessary export/import logic here or ensure app.js has it */

async function initMaintenanceStatus() {
  const { data: config } = await sb.from("site_config").select("value").eq("key", "maintenance_mode").maybeSingle();
  const active = config && config.value === true;
  const btn = document.getElementById("maintenanceToggle");
  if (!btn) return;
  btn.innerText = "SITE MAINTENANCE: " + (active ? "ON" : "OFF");
  btn.style.background = active ? "#27ae60" : "#c00";
}

async function toggleMaintenanceMode() {
  const { data: config } = await sb.from("site_config").select("value").eq("key", "maintenance_mode").maybeSingle();
  const cur = config && config.value === true;
  const target = !cur;
  if (target === true && !confirm("SHUT DOWN SITE FOR ALL USERS?")) return;
  await sb.from("site_config").upsert({ key: "maintenance_mode", value: target });
  initMaintenanceStatus();
}

// Data Portability functions (simplified for mobile)
async function exportData() {
  const { data: posts } = await sb.from("posts").select("*").ilike("username", me).order("created_at", {ascending:true});
  const { data: wallet } = await sb.from("ermnium_wallets").select("*").ilike("username", me).maybeSingle();
  const payload = { _ermn_export:true, version:1.1, exported_at:new Date().toISOString(), username:me, wallet, posts };
  const blob = new Blob([JSON.stringify(payload, null, 2)], {type:"application/json"});
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url;
  a.download = `ermn-mobile-backup-${me}.ermn`;
  a.click();
}

let _importPayload = null;
function previewImport(e) {
  const file = e.target.files[0];
  if (!file) return;
  const r = new FileReader();
  r.onload = (ev) => {
    try {
      const data = JSON.parse(ev.target.result);
      if (!data._ermn_export) return;
      _importPayload = data;
      document.getElementById("importPreviewBody").innerHTML = `<b>Posts:</b> ${data.posts.length}<br><b>ERN:</b> ${data.wallet?.balance || 0}`;
      document.getElementById("importPreview").style.display = "block";
    } catch(err) { alert("Invalid file"); }
  };
  r.readAsText(file);
}

async function importData() {
  if (!_importPayload || !confirm("Restore data?")) return;
  const posts = _importPayload.posts;
  for (const p of posts) {
    await sb.from("posts").insert({ username:me, text:p.text, created_at:p.created_at });
  }
  if (_importPayload.wallet && localStorage.getItem("isDeveloper") === "true") {
    await sb.from("ermnium_wallets").update({
      balance: _importPayload.wallet.balance,
      bank_balance: _importPayload.wallet.bank_balance,
      points_balance: _importPayload.wallet.points_balance
    }).ilike("username", me);
  }
  alert("Restored!");
  location.reload();
}

document.addEventListener("sessionReady", loadSettings);
</script>
</body>
</html>
